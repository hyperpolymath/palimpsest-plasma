#
# k9iser manifest for palimpsest-plasma
# Plasma UI layer for the Palimpsest license ecosystem

[project]
name = "palimpsest-plasma"
safety_tier = "hunt"

[[source]]
path = "Cargo.toml"
type = "cargo"
output = "generated/k9iser/cargo-manifest.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[source]]
path = ".github/workflows/hypatia-scan.yml"
type = "workflow"
output = "generated/k9iser/ci-security.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "workflows includes hypatia-scan"
severity = "error"
